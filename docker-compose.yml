services:
  overlay-lab:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: recall-fs-lab
    ports:
      - "8000:8000"
    environment:
      OVERLAY_LAB_ROOT: /app/overlay_lab
    volumes:
      - overlay_lab_data:/app/overlay_lab
    restart: unless-stopped

volumes:
  overlay_lab_data:
